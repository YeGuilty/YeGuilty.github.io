<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Project Bestial - Jon Tolentino</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: black;
      color: white;
      margin: 0em;
      padding: 0em;
    }
	
	h1 {
	  font-family: Cinzel, sans-serif;
	  font-size: 6vw;
	}
	
	h6 {
	  font-size: 2.5vw;
	}
	
	#container{
	  text-align: center;
	}

    div.sticky {
      position: sticky;
      top: 0;
    }
	
	#collMenu {
	  color: rgba(200,200,200,1);
	  font-size: 2vw;
	}
	
	#collMenu: hover; {
	  color: #c70e28;
	  font-size: 2vw;
	}

    .topnav {
      overflow: hidden;
      background-color: rgba(199, 14, 40, 1);
      position: sticky;
    }

    .topnav #myLinks {
      display: none;
	  position: fixed;
	  top: 6vw;
	  background: rgba(199, 14, 40, 0.5);
    }

    .topnav a {
      color: white;
      padding: 2vw 2vw 2vw 2vw;
      text-decoration: none;
      font-size: 1.8vw;
      display: block;
      position: sticky;
	  font-family: Cinzel, sans-serif;
    }

    .topnav a.icon {
      background: black;
      display: block;
      position: absolute;
      left: 0;
      top: 0;
    }

    .topnav a:hover {
      background-color: #c70e28;
      color: black;
    }
	
	@media (max-width: 600px) {
	
	h1 {
	  font-size: 16vw;
	  line-height: 7vh;
	}
	
	h6 {
	  font-size: 4vw;
	}
	
	.topnav a {
      color: white;
      padding: 2vw 2vw 2vw 2vw;
      text-decoration: none;
      font-size: 7vw;
      display: block;
      position: sticky;
	  font-family: Cinzel, sans-serif;
    }
	
	  .topnav {
      overflow: hidden;
      background-color: rgba(199, 14, 40, 1);
      position: sticky;
    }

    .topnav #myLinks {
      display: none;
	  position: fixed;
	  top: 13vw;
	  background: rgba(199, 14, 40, 0.5);
    }
	
	#collMenu {
	  color: rgba(200,200,200,1);
	  font-size: 6vw;
	  padding: 1vw;
	}
	
	}

  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Creepster&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
  <div class="sticky">
    <!-- Simulate a smartphone / tablet -->
    <div class="mobile-container">
      <!-- Top Navigation Menu -->
      <div class="topnav">
        <a href="#home" class="active" style="font-family: Cinzel, sans-serif; padding-left: 12vw; font-weight: 900; color:black;">Project Bestial</a>
        <div id="myLinks">
          <a href="#news">News</a>
          <a href="#contact">Contact</a>
          <a href="#about">About</a>
        </div>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
          <span id="collMenu">☰</span>
        </a>
      </div>
    </div>

  </div>
  <div id="container">
    <div id="content">
      <div id="mainH">
        <img src="https://res.cloudinary.com/dyl1rx2nx/image/upload/v1780451415/akraphos_yra0ep.jpg" width=auto alt="akraphos image" style="width: 32vw;">
        <h1 style="color: #a30505;">Project Bestial</h1>
        <h6 style="color: #a30505; opacity: 0.8; font-family: Cinzel, sans-serif;"><i>Blessed Be The Night's Wind</i></h6>
      </div>
      <br>

      <div style="margin-top: 8em;">
        <a href="https://x.com/YeGuilty_" target="_blank" style="text-decoration: none;">
          <img class="social" src="https://i.postimg.cc/7L9npRRy/tw-log.jpg" width=auto style="width: 3vw;">
        </a>
		<a href="https://www.instagram.com/yeguilty_/" target="_blank" style="text-decoration: none;">
          <img class="social" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1280px-Instagram_logo_2016.svg.png" width=auto style="width: 3vw;">
        </a>
		
      </div>

      <br>

      <div><i></i></div>

      <br>
      <div id="copyright_stuff" class="footer">
        Copyright © 2026 Ye Guilty
      </div>
      <br><br>
    </div>
    <script>
      function myFunction() {
        var x = document.getElementById("myLinks");
        if (x.style.display === "block") {
          x.style.display = "none";
        } else {
          x.style.display = "block";
        }
      }
	  
    </script>

    <script src="script.js"></script>
</body>

</html>
